name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src api tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 src api tests --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Download dummy dataset for tests
      run: |
        mkdir -p data/raw
        # We fetch a tiny slice of adult data just so data pipelines don't fail in CI
        curl -s https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data | head -n 1000 > data/raw/adult.data
        curl -s https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.test | head -n 500 > data/raw/adult.test

    - name: Run training and data scripts to generate artifacts
      run: |
        python -m src.data_processing
        python -m src.train --no-mlflow

    - name: Test with pytest
      run: |
        pytest tests/ -v
